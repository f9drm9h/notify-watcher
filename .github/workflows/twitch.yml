name: twitch

on:
  schedule:
    # Every 15 minutes: a lightweight, Twitch-only check so "went live" alerts
    # arrive within minutes instead of waiting up to ~3 hours for the main watch
    # run. GitHub may still delay/skip the odd tick, but at this cadence a live
    # stream is caught quickly. Public repo => Actions minutes are free.
    - cron: "*/15 * * * *"
  workflow_dispatch:

# Share the main watcher's concurrency group so the two never write state.json at
# the same time. cancel-in-progress: false => whichever is running finishes first.
concurrency:
  group: watch
  cancel-in-progress: false

permissions:
  contents: write  # needed to commit state.json back to the repo

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Twitch check only
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          NTFY_SERVER: ${{ secrets.NTFY_SERVER }}
          # Run just the Twitch topic (see main._selected_topics). No daily work,
          # no collectors — one quick uptime call per watched streamer.
          NOTIFY_ONLY: twitch
        run: python -m notify_watcher.main

      - name: Commit updated state (if changed)
        run: |
          if git diff --quiet -- state.json; then
            echo "state.json unchanged, nothing to commit"
            exit 0
          fi
          git config user.name  "notify-watcher-bot"
          git config user.email "actions@users.noreply.github.com"
          git add state.json
          git commit -m "chore: update state (twitch) [skip ci]"
          # Push with rebase-and-retry: a queued/concurrent run may have advanced
          # the branch. state.json is the only file this job touches and the shared
          # concurrency group serializes writers, so the rebase is conflict-free in
          # practice; --autostash keeps it safe if anything else is dirty.
          branch="$(git rev-parse --abbrev-ref HEAD)"
          for attempt in 1 2 3 4 5; do
            if git push origin "HEAD:${branch}"; then
              echo "pushed state on attempt ${attempt}"
              exit 0
            fi
            echo "push rejected (attempt ${attempt}); rebasing on origin/${branch} and retrying"
            git pull --rebase --autostash origin "${branch}" || true
          done
          echo "could not push state.json after 5 attempts" >&2
          exit 1

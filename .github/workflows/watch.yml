name: watch

on:
  schedule:
    # Every 15 minutes. Each run always checks Twitch latency-sensitive alerts;
    # the first surviving run in each 3-hour UTC window performs the full sweep.
    # This avoids a separate twitch.yml workflow sharing the same concurrency
    # group: GitHub concurrency allows one running + one pending run, and a newer
    # queued run replaces the older pending one even with cancel-in-progress:
    # false. Deciding "is a full sweep due?" at runtime makes that replacement
    # harmless — the latest pending run simply does the overdue full sweep.
    - cron: "*/15 * * * *"
  workflow_dispatch:
    inputs:
      test_push:
        description: "Send a one-off test notification and exit (skips the watchers)"
        type: boolean
        default: false
      daily:
        description: "Also run the daily digest + health tip on this manual run"
        type: boolean
        default: false
      only:
        description: "Run just this one topic now (comma-separated allowed); empty runs the normal sweep"
        type: string
        default: ""

# Prevent two scheduled runs from racing each other on the state file. Because
# pending runs can be replaced in this group, do not encode important behavior
# only in a specific cron tick; the mode decision below reads committed state.
concurrency:
  group: watch
  cancel-in-progress: false

permissions:
  contents: write  # needed to commit runtime state files back to the repo

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync latest state before mode decision
        run: |
          # A queued run may have been created before the previous serialized
          # run committed state.json. Refresh the branch tip now so the
          # full-sweep gate reads the newest watch_schedule stamp.
          git fetch origin "${GITHUB_REF_NAME}"
          git checkout -B "${GITHUB_REF_NAME}" "origin/${GITHUB_REF_NAME}"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Decide watcher mode
        id: mode
        run: |
          window="$(python -c "import time; print(int(time.time() // 10800))")"
          last="$(python -c "import json, pathlib; p=pathlib.Path('state.json'); s=json.loads(p.read_text()) if p.exists() else {}; print((s.get('watch_schedule') or {}).get('last_full_window', ''))")"
          mode="twitch"
          reason="full sweep already ran for 3-hour window ${window}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            mode="full"
            reason="manual dispatch"
          elif [ "${last}" != "${window}" ]; then
            mode="full"
            reason="first surviving run for 3-hour window ${window} (last: ${last:-none})"
          fi
          echo "run_mode=${mode}" >> "$GITHUB_OUTPUT"
          echo "full_window=${window}" >> "$GITHUB_OUTPUT"
          echo "watcher mode: ${mode} - ${reason}"

      - name: Run watcher mode
        env:
          # Outbound delivery is now Discord rich embeds (notify_watcher.discord_delivery).
          # DISCORD_TOKEN is the bot token; the CHANNEL_* ids route each topic
          # category to its channel (finance/discovery/logs/briefing/general).
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          CHANNEL_FINANCE: ${{ secrets.CHANNEL_FINANCE }}
          CHANNEL_DISCOVERY: ${{ secrets.CHANNEL_DISCOVERY }}
          CHANNEL_LOGS: ${{ secrets.CHANNEL_LOGS }}
          CHANNEL_BRIEFING: ${{ secrets.CHANNEL_BRIEFING }}
          CHANNEL_GENERAL: ${{ secrets.CHANNEL_GENERAL }}
          # Inbound reply-button control loop is now Discord-native: the sweep
          # drains a private control channel (discord_control.poll) for the
          # commands relayed by bot.py's button taps and any free-text admin
          # commands typed into it. NTFY_CONTROL_TOPIC is retained only as a
          # dormant fallback (a no-op unless still set).
          DISCORD_CONTROL_CHANNEL: ${{ secrets.DISCORD_CONTROL_CHANNEL }}
          NTFY_CONTROL_TOPIC: ${{ secrets.NTFY_CONTROL_TOPIC }}
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}  # movie watcher (optional)
          RAWG_API_KEY: ${{ secrets.RAWG_API_KEY }}  # game watcher (optional)
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}        # AI summary (optional)
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}  # AI summary fallback (optional)
          NASA_API_KEY: ${{ secrets.NASA_API_KEY }}  # APOD picture (optional; DEMO_KEY without)
          # Spending tracker (optional): Gmail IMAP credentials for the BHD
          # transaction-alert poll. Parsed transactions are committed as
          # data/spending.json.enc, encrypted with SPENDING_KEY (Fernet) so
          # the repo never holds plaintext purchase history.
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          SPENDING_KEY: ${{ secrets.SPENDING_KEY }}
          # Empty on schedule; "1" only when manually dispatched with test_push.
          NOTIFY_TEST_PUSH: ${{ inputs.test_push && '1' || '' }}
          # Force the daily work (digest/health tip/learn) on a manual run with
          # daily=true. On schedule it's left empty: main._is_daily_run() decides
          # by UTC hour instead, so a dropped cron can't skip the daily push.
          NOTIFY_DAILY: ${{ inputs.daily && '1' || '' }}
          # Twitch-only mode keeps the 15-minute live alerts lightweight. Full
          # mode leaves NOTIFY_ONLY empty so main.py runs every topic in order.
          NOTIFY_ONLY: ${{ inputs.only != '' && inputs.only || (steps.mode.outputs.run_mode == 'twitch' && 'twitch' || '') }}
        run: python -m notify_watcher.main

      - name: Stamp full sweep window
        if: ${{ steps.mode.outputs.run_mode == 'full' && inputs.only == '' && (github.event_name != 'workflow_dispatch' || inputs.test_push != true) }}
        env:
          FULL_WINDOW: ${{ steps.mode.outputs.full_window }}
        run: |
          python -c "import json, os, pathlib; p=pathlib.Path('state.json'); s=json.loads(p.read_text()) if p.exists() else {}; s.setdefault('watch_schedule', {})['last_full_window']=os.environ['FULL_WINDOW']; p.write_text(json.dumps(s, indent=2, sort_keys=True) + '\n')"

      - name: Build dashboard
        if: ${{ steps.mode.outputs.run_mode == 'full' && inputs.only == '' && (github.event_name != 'workflow_dispatch' || inputs.test_push != true) }}
        # Pure reader of the committed state -> docs/dashboard/index.html, which
        # GitHub Pages serves (Settings -> Pages -> Deploy from branch, /docs). A
        # build failure must never fail the run or block the state commit.
        run: python -m notify_watcher.dashboard || echo "dashboard build failed (non-fatal)"

      - name: Commit updated state + dashboard (if changed)
        run: |
          # data/spending.json.enc is created by the spending topic on the
          # runner, so it must ride the state commit or every run re-parses from
          # scratch. audit.json is also runner-written and must persist across
          # ephemeral runners for explain diagnostics. git status --porcelain
          # (unlike git diff) also sees files while untracked.
          if git diff --quiet -- state.json audit.json docs/dashboard \
             && [ -z "$(git status --porcelain -- data/spending.json.enc)" ]; then
            echo "state.json, audit.json, dashboard and spending log unchanged, nothing to commit"
            exit 0
          fi
          git config user.name  "notify-watcher-bot"
          git config user.email "actions@users.noreply.github.com"
          git add state.json audit.json docs/dashboard
          if [ -f data/spending.json.enc ]; then git add data/spending.json.enc; fi
          git commit -m "chore: update state + dashboard [skip ci]"
          # Push with rebase-and-retry: if a concurrent/queued run advanced the
          # branch between checkout and now, a bare push is rejected (non-fast-
          # forward). Rebase our commit onto the new remote tip and retry. state.json
          # and the generated dashboard are the only files we touch and the
          # concurrency group serializes runs, so the rebase is conflict-free in
          # practice; --autostash keeps it safe if anything else is dirty.
          branch="$(git rev-parse --abbrev-ref HEAD)"
          for attempt in 1 2 3 4 5; do
            if git push origin "HEAD:${branch}"; then
              echo "pushed state on attempt ${attempt}"
              exit 0
            fi
            echo "push rejected (attempt ${attempt}); rebasing on origin/${branch} and retrying"
            git pull --rebase --autostash origin "${branch}" || true
          done
          echo "could not push state.json after 5 attempts" >&2
          exit 1

      - name: Generate status dashboard (cinematic UI)
        if: ${{ always() }}
        # The very last step: regenerate dashboard.html from the now-updated
        # state.json so the cinematic status console stays perfectly in sync with
        # every run. It is a pure reader (never touches state, never notifies) and
        # is gitignored — it depends on the local wallpapers/ folder, so it is a
        # build artifact, not a committed file. always()+|| guarantee it can never
        # fail the run or block anything that came before it.
        run: python -m notify_watcher.generate_dashboard || echo "dashboard.html generation failed (non-fatal)"

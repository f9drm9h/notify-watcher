name: watch

on:
  schedule:
    # Every 3 hours at minute 0: collectors + entity watchers. The daily work
    # (digest flush, health tip, learn) is no longer tied to a dedicated cron —
    # main._is_daily_run() triggers it on the first run on/after 12:00 UTC each
    # day, because GitHub silently drops/delays scheduled runs and the old
    # minute-5 daily cron kept getting skipped (so the digest/tip never ran).
    - cron: "0 */3 * * *"
  workflow_dispatch:
    inputs:
      test_push:
        description: "Send a one-off test notification and exit (skips the watchers)"
        type: boolean
        default: false
      daily:
        description: "Also run the daily digest + health tip on this manual run"
        type: boolean
        default: false

# Prevent two scheduled runs from racing each other on the state file.
concurrency:
  group: watch
  cancel-in-progress: false

permissions:
  contents: write  # needed to commit state.json back to the repo

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run watchers
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          NTFY_SERVER: ${{ secrets.NTFY_SERVER }}
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}  # movie watcher (optional)
          RAWG_API_KEY: ${{ secrets.RAWG_API_KEY }}  # game watcher (optional)
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}        # AI summary (optional)
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}  # AI summary fallback (optional)
          NASA_API_KEY: ${{ secrets.NASA_API_KEY }}  # APOD picture (optional; DEMO_KEY without)
          # Empty on schedule; "1" only when manually dispatched with test_push.
          NOTIFY_TEST_PUSH: ${{ inputs.test_push && '1' || '' }}
          # Force the daily work (digest/health tip/learn) on a manual run with
          # daily=true. On schedule it's left empty: main._is_daily_run() decides
          # by UTC hour instead, so a dropped cron can't skip the daily push.
          NOTIFY_DAILY: ${{ inputs.daily && '1' || '' }}
        run: python -m notify_watcher.main

      - name: Build dashboard
        # Pure reader of the committed state -> docs/dashboard/index.html, which
        # GitHub Pages serves (Settings -> Pages -> Deploy from branch, /docs). A
        # build failure must never fail the run or block the state commit.
        run: python -m notify_watcher.dashboard || echo "dashboard build failed (non-fatal)"

      - name: Commit updated state + dashboard (if changed)
        run: |
          if git diff --quiet -- state.json docs/dashboard; then
            echo "state.json and dashboard unchanged, nothing to commit"
            exit 0
          fi
          git config user.name  "notify-watcher-bot"
          git config user.email "actions@users.noreply.github.com"
          git add state.json docs/dashboard
          git commit -m "chore: update state + dashboard [skip ci]"
          # Push with rebase-and-retry: if a concurrent/queued run advanced the
          # branch between checkout and now, a bare push is rejected (non-fast-
          # forward). Rebase our commit onto the new remote tip and retry. state.json
          # and the generated dashboard are the only files we touch and the
          # concurrency group serializes runs, so the rebase is conflict-free in
          # practice; --autostash keeps it safe if anything else is dirty.
          branch="$(git rev-parse --abbrev-ref HEAD)"
          for attempt in 1 2 3 4 5; do
            if git push origin "HEAD:${branch}"; then
              echo "pushed state on attempt ${attempt}"
              exit 0
            fi
            echo "push rejected (attempt ${attempt}); rebasing on origin/${branch} and retrying"
            git pull --rebase --autostash origin "${branch}" || true
          done
          echo "could not push state.json after 5 attempts" >&2
          exit 1

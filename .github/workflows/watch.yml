name: watch

on:
  schedule:
    # Every 3 hours at minute 0. Adjust if you want it more/less often.
    - cron: "0 */3 * * *"
  workflow_dispatch:
    inputs:
      test_push:
        description: "Send a one-off test notification and exit (skips the watchers)"
        type: boolean
        default: false

# Prevent two scheduled runs from racing each other on the state file.
concurrency:
  group: watch
  cancel-in-progress: false

permissions:
  contents: write  # needed to commit state.json back to the repo

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run watchers
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          NTFY_SERVER: ${{ secrets.NTFY_SERVER }}
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}  # movie watcher (optional)
          RAWG_API_KEY: ${{ secrets.RAWG_API_KEY }}  # game watcher (optional)
          # Empty on schedule; "1" only when manually dispatched with test_push.
          NOTIFY_TEST_PUSH: ${{ inputs.test_push && '1' || '' }}
        run: python -m notify_watcher.main

      - name: Commit updated state (if changed)
        run: |
          if git diff --quiet -- state.json; then
            echo "state.json unchanged, nothing to commit"
            exit 0
          fi
          git config user.name  "notify-watcher-bot"
          git config user.email "actions@users.noreply.github.com"
          git add state.json
          git commit -m "chore: update state [skip ci]"
          git push
